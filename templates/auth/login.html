{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">R</div>
    <h1 class="h4 fw-bold text-center mb-1">Bienvenido de vuelta</h1>
    <p class="text-secondary text-center mb-4">Inicia sesión para acceder a tu organización.</p>
    <form method="post" class="d-grid gap-3">
      {% csrf_token %}
      {{ form }}
      <button class="btn btn-primary btn-lg" type="submit">Entrar</button>
    </form>
    <p class="text-center text-secondary small mt-4 mb-0">¿No tienes cuenta? <a href="{% url 'accounts:register' %}" class="fw-semibold text-decoration-none">Crear organización</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
