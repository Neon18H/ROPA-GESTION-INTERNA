{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión · ROPA CINEMA SaaS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="auth-cinema">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card glass-card border-0">
        <div class="card-body p-4 p-lg-5">
          <h3 class="mb-1">Bienvenido</h3>
          <p class="text-muted mb-4">Inicia sesión en tu panel de operación.</p>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100"><i class="fas fa-right-to-bracket me-2"></i>Entrar</button>
          </form>
          <div class="mt-4 small">
            <a href="{% url 'accounts:register' %}" class="d-block">Crear tienda / Registrarme</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
