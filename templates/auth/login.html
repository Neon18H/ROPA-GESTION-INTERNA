{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · ERP Cloud</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="auth-cinema">
  <div class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
    <div class="auth-card card glass-card border-0 w-100" style="max-width:430px;">
      <div class="card-body p-4 p-lg-5">
        <h3 class="mb-1">Accede a tu ERP</h3>
        <p class="text-muted mb-4">Gestión multi-tenant profesional para tu operación.</p>
        <form method="post" class="d-grid gap-3">{% csrf_token %}{{ form.as_p }}
          <button class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar sesión</button>
        </form>
        <a href="{% url 'accounts:register' %}" class="d-inline-block mt-3">Crear tienda</a>
      </div>
    </div>
  </div>
</body>
</html>
