{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión | ROPA Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="auth-page">
<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5 col-xl-4">
      <div class="card auth-card border-0">
        <div class="card-body p-4 p-lg-5">
          <div class="text-center mb-4">
            <span class="auth-mark mb-3"><i class="bi bi-shield-lock"></i></span>
            <h1 class="h4 mb-1">Bienvenido de nuevo</h1>
            <p class="text-secondary mb-0">Accede a tu entorno de gestión enterprise.</p>
          </div>

          {% if form.non_field_errors %}
            <div class="alert alert-danger small">{{ form.non_field_errors }}</div>
          {% endif %}

          <form method="post" class="d-grid gap-3">
            {% csrf_token %}
            <div>
              <label for="id_username" class="form-label">Usuario</label>
              <input type="text" name="username" id="id_username" class="form-control" required>
            </div>
            <div>
              <label for="id_password" class="form-label">Contraseña</label>
              <input type="password" name="password" id="id_password" class="form-control" required>
              <div class="form-text">Usa tus credenciales corporativas para ingresar.</div>
            </div>
            <button class="btn btn-primary" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión</button>
          </form>

          <p class="text-center text-secondary mt-4 mb-0">¿Aún no tienes cuenta? <a href="{% url 'accounts:register' %}" class="fw-semibold text-decoration-none">Crear organización</a></p>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
