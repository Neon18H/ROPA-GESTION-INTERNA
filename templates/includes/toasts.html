{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1080">
  {% for message in messages %}
  <div class="toast show align-items-center text-bg-dark border-0 mb-2" role="alert">
    <div class="d-flex">
      <div class="toast-body"><i class="fa-solid fa-circle-info me-2"></i>{{ message }}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
