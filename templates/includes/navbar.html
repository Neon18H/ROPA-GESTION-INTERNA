<header class="app-topbar sticky-top">
  <div class="px-3 px-lg-4 py-2">
    <div class="d-flex align-items-center gap-2 gap-lg-3">
      <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Abrir menú">
        <i class="bi bi-list fs-5"></i>
      </button>

      <form class="topbar-search flex-grow-1" role="search">
        <i class="bi bi-search"></i>
        <input type="search" class="form-control" placeholder="Buscar productos, clientes, ventas...">
      </form>

      <span class="badge text-bg-light border org-badge d-none d-sm-inline-flex align-items-center">
        <i class="bi bi-buildings me-1"></i>{{ request.user.organization.name|default:'Sin organización' }}
      </span>

      <div class="dropdown">
        <button class="btn btn-light border dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <span class="avatar-circle">{{ request.user.username|default:'U'|slice:':1'|upper }}</span>
          <span class="d-none d-md-inline">{{ request.user.username }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li><a class="dropdown-item" href="{% url 'settings_app:index' %}"><i class="bi bi-sliders me-2"></i>Configuración</a></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <form method="post" action="{% url 'accounts:logout' %}" class="d-block">
              {% csrf_token %}
              <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
