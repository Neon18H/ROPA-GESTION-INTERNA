<header class="saas-topbar px-3 px-lg-4">
  <div class="d-flex align-items-center gap-3 w-100">
    <div class="organization-chip d-none d-md-inline-flex">
      <i class="bi bi-buildings"></i>
      <span>{{ request.user.organization.name|default:'Sin organización' }}</span>
    </div>
    <form class="global-search mx-auto" role="search">
      <i class="bi bi-search"></i>
      <input type="search" class="form-control" placeholder="Buscar productos, SKU, clientes, transacciones...">
    </form>
    <div class="dropdown">
      <button class="btn user-menu-btn dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
        <span class="avatar-circle">{{ request.user.username|default:'U'|slice:':1'|upper }}</span>
        <span class="d-none d-lg-inline">{{ request.user.username }}</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Perfil</a></li>
        <li><a class="dropdown-item" href="{% url 'settings_app:index' %}"><i class="bi bi-sliders me-2"></i>Configuración</a></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</header>
