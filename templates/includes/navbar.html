<header class="topbar">
  <form class="w-50">
    <div class="input-group input-group-sm">
      <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
      <input class="form-control border-start-0" placeholder="Buscar productos, SKU, OC...">
    </div>
  </form>
  <div class="d-flex align-items-center gap-3">
    <span class="text-muted small">{{ request.user.organization.name|default:'Sin organización' }}</span>
    <div class="dropdown">
      <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
        <i class="bi bi-person-circle"></i> {{ request.user.username }}
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><span class="dropdown-item-text small text-muted">{{ request.user.role }}</span></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</header>
