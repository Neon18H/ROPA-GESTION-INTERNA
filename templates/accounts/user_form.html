{% extends 'base.html' %}
{% block page_title %}Nuevo usuario{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="post">{% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success"><i class="fa fa-save me-1"></i>Guardar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
