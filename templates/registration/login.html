{% load static %}
<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="{% static 'css/app.css' %}"></head>
<body class="auth-page"><div class="container py-5"><div class="row justify-content-center"><div class="col-md-4"><div class="card shadow-sm"><div class="card-body p-4"><h4 class="mb-3">Iniciar sesión</h4>
<form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-dark w-100">Entrar</button></form>
<p class="mt-3 mb-0">¿No tienes tienda? <a href="{% url 'accounts:register' %}">Regístrala</a></p></div></div></div></div></div></body></html>
