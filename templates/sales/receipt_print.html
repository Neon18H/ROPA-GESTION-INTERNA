<!doctype html><html><head><meta charset="utf-8"><title>Recibo #{{ sale.number }}</title><style>body{font-family:Arial;padding:20px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ddd;padding:6px}</style></head><body onload="window.print()">
<h2>Recibo Venta #{{ sale.number }}</h2>
<p>Cliente: {{ sale.customer.name|default:'Consumidor final' }}</p>
<table><thead><tr><th>Producto</th><th>Cant</th><th>Total</th></tr></thead><tbody>{% for i in sale.items.all %}<tr><td>{{ i.variant.product.name }} {{ i.variant.size }}/{{ i.variant.color }}</td><td>{{ i.qty }}</td><td>{{ i.line_total }}</td></tr>{% endfor %}</tbody></table>
<h3 style="text-align:right">Total: {{ sale.total }}</h3>
</body></html>
