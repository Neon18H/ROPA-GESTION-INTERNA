{% extends 'base.html' %}
{% block content %}
<div class="card p-3">
  <div class="d-flex justify-content-between align-items-center mb-3"><h5 class="mb-0">Producto</h5><div class="d-flex gap-2"><a class="btn btn-outline-secondary btn-sm" href="{% url 'inventory:categories' %}">Categorías</a><a class="btn btn-outline-secondary btn-sm" href="{% url 'inventory:brands' %}">Marcas</a></div></div>
  <form method="post">{% csrf_token %}{{ form.as_p }}
    <div class="d-flex gap-2"><button class="btn btn-dark btn-sm">Guardar</button><button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#quickCategory">Crear categoría</button><button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#quickBrand">Crear marca</button></div>
  </form>
</div>
<div class="modal fade" id="quickCategory" tabindex="-1"><div class="modal-dialog"><div class="modal-content p-3"><input class="form-control" id="quickCategoryName" placeholder="Categoría"><button class="btn btn-dark btn-sm mt-2" id="saveQuickCategory">Guardar</button></div></div></div>
<div class="modal fade" id="quickBrand" tabindex="-1"><div class="modal-dialog"><div class="modal-content p-3"><input class="form-control" id="quickBrandName" placeholder="Marca"><button class="btn btn-dark btn-sm mt-2" id="saveQuickBrand">Guardar</button></div></div></div>
{% endblock %}
{% block extra_js %}<script>
$('#saveQuickCategory').on('click', function(){ $.post("{% url 'inventory:quick_category_create' %}", {name: $('#quickCategoryName').val(), csrfmiddlewaretoken:'{{ csrf_token }}'}).done(function(r){ $('#id_category').append(new Option(r.name, r.id, true, true)).trigger('change'); bootstrap.Modal.getInstance(document.getElementById('quickCategory')).hide();});});
$('#saveQuickBrand').on('click', function(){ $.post("{% url 'inventory:quick_brand_create' %}", {name: $('#quickBrandName').val(), csrfmiddlewaretoken:'{{ csrf_token }}'}).done(function(r){ $('#id_brand').append(new Option(r.name, r.id, true, true)).trigger('change'); bootstrap.Modal.getInstance(document.getElementById('quickBrand')).hide();});});
</script>{% endblock %}
