{% extends 'base.html' %}
{% block page_title %}Nueva compra{% endblock %}
{% block content %}
<form method="post" class="card">{% csrf_token %}
  <div class="card-header d-flex justify-content-between"><span>Crear orden de compra</span><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#quickSupplier">Crear proveedor</button></div>
  <div class="card-body">
    {{ form.as_p }}
    <table class="table" id="purchaseItems"><thead><tr><th>Producto</th><th>Cant</th><th>Costo unit</th></tr></thead><tbody></tbody></table>
    <div class="list-group small">{% for v in variants %}<button type="button" class="list-group-item list-group-item-action add-purchase-item" data-id="{{ v.id }}" data-name="{{ v.product.name }} {{ v.size }}/{{ v.color }}">{{ v.product.sku }} - {{ v.product.name }} {{ v.size }}/{{ v.color }}</button>{% endfor %}</div>
  </div>
  <div class="card-footer text-end"><button class="btn btn-primary btn-sm">Guardar</button></div>
</form>
<div class="modal fade" id="quickSupplier" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body"><input id="supplierName" class="form-control" placeholder="Proveedor"></div><div class="modal-footer"><button class="btn btn-primary btn-sm" id="saveSupplier">Guardar</button></div></div></div></div>
{% endblock %}
{% block extra_js %}
<script>
$('.add-purchase-item').on('click', function(){
  const id=$(this).data('id'), name=$(this).data('name');
  $('#purchaseItems tbody').append(`<tr><td>${name}<input type='hidden' name='variant_id' value='${id}'></td><td><input type='number' min='1' value='1' name='qty' class='form-control form-control-sm'></td><td><input type='number' step='0.01' value='0' name='unit_cost' class='form-control form-control-sm'></td></tr>`);
});
$('#saveSupplier').on('click', function(){
  $.post("{% url 'purchases:quick_supplier_create' %}", {name: $('#supplierName').val(), csrfmiddlewaretoken:'{{ csrf_token }}'}).done(function(r){
    $('#id_supplier').append(new Option(r.name, r.id, true, true));
    bootstrap.Modal.getInstance(document.getElementById('quickSupplier')).hide();
  });
});
</script>
{% endblock %}
