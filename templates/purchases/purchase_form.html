{% extends 'base.html' %}
{% block page_title %}Nueva compra{% endblock %}
{% block content %}
<form method="post" class="card">{% csrf_token %}
  <div class="card-header">Crear orden de compra</div>
  <div class="card-body">
    {{ form.as_p }}
    <table class="table" id="purchaseItems"><thead><tr><th>Producto</th><th>Cant</th><th>Costo unit</th></tr></thead><tbody></tbody></table>
    <div class="list-group small">{% for v in variants %}<button type="button" class="list-group-item list-group-item-action add-purchase-item" data-id="{{ v.id }}" data-name="{{ v.product.name }} {{ v.size }}/{{ v.color }}">{{ v.product.sku }} - {{ v.product.name }} {{ v.size }}/{{ v.color }}</button>{% endfor %}</div>
  </div>
  <div class="card-footer text-end"><button class="btn btn-success">Guardar</button></div>
</form>
{% endblock %}
{% block extra_js %}
<script>
$('.add-purchase-item').on('click', function(){
  const id=$(this).data('id'), name=$(this).data('name');
  $('#purchaseItems tbody').append(`<tr><td>${name}<input type='hidden' name='variant_id' value='${id}'></td><td><input type='number' min='1' value='1' name='qty' class='form-control'></td><td><input type='number' step='0.01' value='0' name='unit_cost' class='form-control'></td></tr>`);
});
</script>
{% endblock %}
