{% extends "base.html" %}
{% block content %}
<div class="card p-3">
  <h5 class="mb-3">{% if object %}Editar{% else %}Nuevo{% endif %} proveedor</h5>
  <form method="post" action="">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div class="mb-2">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        <div class="text-danger small">{{ field.errors }}</div>
      </div>
    {% endfor %}
    <button class="btn btn-dark btn-sm" type="submit">Guardar</button>
    <a href="{% url 'purchases:suppliers' %}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
  </form>
</div>
{% endblock %}
