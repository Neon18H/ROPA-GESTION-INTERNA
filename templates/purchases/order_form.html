{% extends 'base.html' %}
{% block content %}
<form method="post" class="card p-3">{% csrf_token %}
  <div class="d-flex justify-content-between mb-2"><h5 class="mb-0">Nueva orden de compra</h5><button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#quickSupplier">Nuevo proveedor</button></div>
  {{ form.as_p }}
  <table class="table table-modern" id="purchaseItems"><thead><tr><th>Variante</th><th>Cant</th><th>Costo unitario</th><th></th></tr></thead><tbody></tbody></table>
  <div class="list-group small mb-3">{% for v in variants %}<button type="button" class="list-group-item list-group-item-action add-purchase-item" data-id="{{ v.id }}" data-name="{{ v.product.name }} {{ v.size }}/{{ v.color }}">{{ v.product.sku }} · {{ v.product.name }} · {{ v.size }}/{{ v.color }}</button>{% endfor %}</div>
  <button class="btn btn-dark btn-sm">Guardar OC</button>
</form>
<div class="modal fade" id="quickSupplier" tabindex="-1"><div class="modal-dialog"><div class="modal-content p-3"><input id="supplierName" class="form-control" placeholder="Proveedor"><button class="btn btn-dark btn-sm mt-2" id="saveSupplier">Guardar</button></div></div></div>
{% endblock %}
{% block extra_js %}<script>
$(document).on('click','.add-purchase-item',function(){const id=$(this).data('id'),name=$(this).data('name');$('#purchaseItems tbody').append(`<tr><td>${name}<input type='hidden' name='variant_id' value='${id}'></td><td><input class='form-control form-control-sm' type='number' name='qty' min='1' value='1'></td><td><input class='form-control form-control-sm' type='number' step='0.01' name='unit_cost' min='0' value='0'></td><td><button type='button' class='btn btn-sm btn-outline-danger remove-row'>x</button></td></tr>`)});
$(document).on('click','.remove-row',function(){$(this).closest('tr').remove();});
$('#saveSupplier').on('click', function(){ $.post("{% url 'purchases:quick_supplier_create' %}", {name: $('#supplierName').val(), csrfmiddlewaretoken:'{{ csrf_token }}'}).done(function(r){ $('#id_supplier').append(new Option(r.name, r.id, true, true)); bootstrap.Modal.getInstance(document.getElementById('quickSupplier')).hide();});});
</script>{% endblock %}
