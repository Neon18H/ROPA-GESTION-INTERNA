{% extends "base.html" %}
{% block content %}
<div class="card p-3">
  <h5>Eliminar proveedor</h5>
  <p>¿Seguro que deseas eliminar <strong>{{ object.name }}</strong>?</p>
  <form method="post">{% csrf_token %}
    <button class="btn btn-danger btn-sm" type="submit">Eliminar</button>
    <a href="{% url 'purchases:suppliers' %}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
  </form>
</div>
{% endblock %}
