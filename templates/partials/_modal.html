<div class="modal fade" id="{{ modal_id|default:'confirmModal' }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title|default:'Confirmar acción' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">{{ body|default:'¿Deseas continuar con esta acción?' }}</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" id="{{ confirm_id|default:'modalConfirmButton' }}">Confirmar</button>
      </div>
    </div>
  </div>
</div>
