<div class="empty-state text-center py-5">
  <i class="bi bi-inbox fs-1 text-secondary"></i>
  <h3 class="h5 mt-3">{{ title|default:'Sin resultados' }}</h3>
  <p class="text-muted mb-3">{{ message|default:'Aún no hay información para mostrar en esta sección.' }}</p>
  {% if cta_url %}<a href="{{ cta_url }}" class="btn btn-primary">{{ cta_label|default:'Crear ahora' }}</a>{% endif %}
</div>
