<div class="empty-state text-center py-5">
  <div class="empty-state-icon mb-3"><i class="bi bi-inbox fs-1 text-secondary"></i></div>
  <h3 class="h6">{{ title|default:'Sin resultados' }}</h3>
  <p class="text-secondary mb-3">{{ message|default:'No hay datos para mostrar en este momento.' }}</p>
  {% if action_url and action_label %}<a href="{{ action_url }}" class="btn btn-primary btn-sm">{{ action_label }}</a>{% endif %}
</div>
