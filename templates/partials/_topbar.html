<header class="app-topbar sticky-top">
  <div class="px-3 px-lg-4 py-2">
    <div class="d-flex align-items-center gap-2 gap-lg-3">
      <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Abrir menú">
        <i class="bi bi-list fs-5"></i>
      </button>
      <form class="topbar-search flex-grow-1" role="search">
        <i class="bi bi-search"></i>
        <input type="search" class="form-control" placeholder="Buscar productos, clientes, ventas..." data-search-debounce="300">
      </form>
      <span class="badge text-bg-light border org-badge d-none d-sm-inline-flex align-items-center">
        <i class="bi bi-buildings me-1"></i>{{ request.user.organization.name|default:'Sin organización' }}
      </span>
      <div class="dropdown ms-auto">
        <button class="btn btn-light border d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <span class="avatar-circle">{{ request.user.username|default:'U'|slice:':1'|upper }}</span>
          <span class="d-none d-md-inline">{{ request.user.username }}</span>
          <i class="bi bi-chevron-down small text-muted"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm enterprise-dropdown">
          <li><a class="dropdown-item" href="{% url 'settings_app:index' %}"><i class="bi bi-person-gear me-2"></i>Perfil / Configuración</a></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <form method="post" action="{% url 'accounts:logout' %}" class="px-2 pb-2">
              {% csrf_token %}
              <button class="btn btn-danger w-100 d-inline-flex align-items-center justify-content-center gap-2" type="submit">
                <i class="bi bi-box-arrow-right"></i>
                Cerrar sesión
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
